apiVersion: v1
kind: Secret
metadata:
  name: tallemalle-tls
  namespace: jdh
type: kubernetes.io/tls
data:
  # 아래 값들을 base64 인코딩된 값으로 교체하세요
  # 인코딩 방법:
  #   cat fullchain.crt | base64 -w 0   (Linux/Mac)
  #   certutil -encode fullchain.crt tmp.b64 && findstr /v /c:- tmp.b64 > encoded.txt  (Windows)
  tls.crt: |
    LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t
    # fullchain.crt base64 값으로 교체
  tls.key: |
    LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQ==
    # private.key base64 값으로 교체
